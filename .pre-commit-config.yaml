# Run with: uv run pre-commit run --all-files
# Install the git hook with: uv run pre-commit install
# Update pinned versions with: uv run pre-commit autoupdate

# Skip generated report artefacts so pre-commit hooks don't reformat them on
# every commit. Re-rendering them is the report command's job, not a hook's.
exclude: ^out/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
